apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cni-lab                 # Replace with: $CLUSTER_NAME
  region: us-east-1             # Replace with: $AWS_REGION
  version: "1.27"

vpc:
  id: "<VPC_ID>"                # Replace with your VPC ID
  subnets:
    public:
      us-east-1a:
        id: "<NODE_SUBNET_1>"   # Replace with 10.0.1.0/24 subnet ID
      us-east-1b:
        id: "<NODE_SUBNET_2>"   # Replace with 10.0.2.0/24 subnet ID

managedNodeGroups:
  - name: ng-1
    instanceType: t3.medium
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    subnets:
      - <NODE_SUBNET_1>
      - <NODE_SUBNET_2>