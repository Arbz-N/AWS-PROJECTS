apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: <YOUR_FILESYSTEM_ID>
  accessPointId: <YOUR_ACCESS_POINT_ID>
  directoryPerms: "700"
  basePath: "/k8s"
  mountOptions:
  - tls
reclaimPolicy: Retain
volumeBindingMode: Immediate